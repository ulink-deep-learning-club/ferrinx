[meta]
name = "lenet-mnist"
version = "1.0"
description = "MNIST digit classification model"

[model]
file = "lenet.onnx"
labels = "lenet_labels.json"

[[inputs]]
name = "import/Placeholder:0"
alias = "image"
shape = [-1, 1, 28, 28]
dtype = "float32"

[[inputs.preprocess]]
type = "resize"
size = [28, 28]

[[inputs.preprocess]]
type = "grayscale"

[[inputs.preprocess]]
type = "to_tensor"
dtype = "float32"
scale = 255.0

[[inputs.preprocess]]
type = "normalize"
mean = [0.1307]
std = [0.3081]

[[outputs]]
name = "output"
alias = "prediction"
shape = [-1, 10]
dtype = "float32"

[[outputs.postprocess]]
type = "softmax"

[[outputs.postprocess]]
type = "argmax"
keep_prob = true

[[outputs.postprocess]]
type = "map_labels"
